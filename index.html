<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WALTH · Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&family=Italiana&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ["class"],
      theme: {
        container: { center: true, padding: "2rem", screens: { "2xl": "1400px" } },
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            display: ['"Space Grotesk"', 'Inter', 'sans-serif'],
          },
          colors: {
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            glow: "hsl(var(--glow))",
            primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
            secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
            destructive: { DEFAULT: "hsl(var(--destructive))", foreground: "hsl(var(--destructive-foreground))" },
            muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
            accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
            popover: { DEFAULT: "hsl(var(--popover))", foreground: "hsl(var(--popover-foreground))" },
            card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "calc(var(--radius) - 2px)",
            sm: "calc(var(--radius) - 4px)",
          },
          keyframes: {
            "fade-up": { "0%": { opacity: "0", transform: "translateY(16px)" }, "100%": { opacity: "1", transform: "translateY(0)" } },
            "pulse-glow": { "0%,100%": { opacity: "0.6" }, "50%": { opacity: "1" } },
            "blink": { "0%,50%": { opacity: "1" }, "50.01%,100%": { opacity: "0" } },
            "float": { "0%,100%": { transform: "translateY(0)" }, "50%": { transform: "translateY(-8px)" } },
          },
          animation: {
            "fade-up": "fade-up 0.7s ease-out both",
            "pulse-glow": "pulse-glow 3s ease-in-out infinite",
            "blink": "blink 1s step-end infinite",
            "float": "float 6s ease-in-out infinite",
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --background: 0 0% 0%;
      --foreground: 270 20% 96%;
      --card: 260 20% 4%;
      --card-foreground: 270 20% 96%;
      --popover: 260 20% 4%;
      --popover-foreground: 270 20% 96%;
      --primary: 270 20% 98%;
      --primary-foreground: 260 30% 6%;
      --secondary: 260 18% 9%;
      --secondary-foreground: 270 20% 96%;
      --muted: 260 15% 8%;
      --muted-foreground: 265 15% 65%;
      --accent: 260 85% 70%;
      --accent-foreground: 0 0% 0%;
      --indigo: 240 80% 60%;
      --lilac: 275 90% 80%;
      --glow: 265 90% 72%;
      --destructive: 0 72% 55%;
      --destructive-foreground: 270 20% 98%;
      --border: 260 25% 12%;
      --input: 260 25% 12%;
      --ring: 260 85% 70%;
      --radius: 0.75rem;
      --gradient-hero:
        radial-gradient(ellipse at 20% 10%, hsl(240 80% 45% / 0.35), transparent 55%),
        radial-gradient(ellipse at 80% 90%, hsl(275 90% 65% / 0.28), transparent 55%),
        radial-gradient(ellipse at 50% 50%, hsl(260 85% 50% / 0.15), transparent 70%);
      --gradient-text:
        linear-gradient(135deg, hsl(270 20% 98%), hsl(260 85% 78%) 50%, hsl(240 80% 70%));
      --gradient-brand:
        linear-gradient(135deg, hsl(var(--indigo)), hsl(var(--accent)), hsl(var(--lilac)));
      --shadow-glow: 0 0 60px hsl(var(--accent) / 0.45);
      --shadow-card: 0 10px 40px -12px hsl(240 80% 30% / 0.4);
    }

    * { border-color: hsl(var(--border)); }
    html { scroll-behavior: smooth; }
    body {
      background-color: #000;
      color: hsl(var(--foreground));
      font-family: 'Inter', ui-sans-serif, system-ui;
      font-feature-settings: "ss01", "cv11";
    }
    ::selection { background: hsl(var(--accent) / 0.35); color: hsl(var(--foreground)); }

    .text-gradient {
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .text-gradient-brand {
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .terminal-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 9999px;
      border: 1px solid hsl(var(--border));
      background-color: hsl(var(--secondary) / 0.6);
      padding: 0.5rem 1rem;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.875rem;
      color: hsl(var(--muted-foreground));
      backdrop-filter: blur(12px);
    }
    .glass {
      border: 1px solid hsl(var(--border) / 0.6);
      background-color: hsl(var(--card) / 0.4);
      backdrop-filter: blur(24px);
    }
    .glow-ring {
      box-shadow: var(--shadow-glow);
    }
    .font-feminine {
      font-family: 'Italiana', 'Cormorant Garamond', serif;
      font-weight: 400;
      letter-spacing: 0.08em;
    }
    .text-shimmer {
      background: linear-gradient(
        100deg,
        hsl(0 0% 100%) 0%,
        hsl(0 0% 100%) 35%,
        hsl(260 85% 88%) 45%,
        hsl(0 0% 100%) 55%,
        hsl(0 0% 100%) 100%
      );
      background-size: 250% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 4.5s linear infinite;
      filter: drop-shadow(0 0 24px hsl(260 85% 75% / 0.35));
    }
    .btn-glow {
      position: relative;
      color: hsl(var(--foreground)) !important;
      transition: box-shadow 0.35s ease, background-color 0.35s ease, transform 0.35s ease;
    }
    .btn-glow:hover {
      color: hsl(var(--foreground)) !important;
      background-color: hsl(var(--secondary) / 0.6) !important;
      box-shadow:
        0 0 24px hsl(var(--accent) / 0.5),
        0 0 60px hsl(var(--glow) / 0.4);
    }
    .cursor-nav {
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 28 28'><defs><radialGradient id='g' cx='50%25' cy='50%25' r='50%25'><stop offset='0%25' stop-color='%23d8b4fe' stop-opacity='1'/><stop offset='40%25' stop-color='%23a78bfa' stop-opacity='0.9'/><stop offset='100%25' stop-color='%236366f1' stop-opacity='0'/></radialGradient></defs><circle cx='14' cy='14' r='12' fill='url(%23g)'/><circle cx='14' cy='14' r='3' fill='%23ffffff'/></svg>") 14 14, auto;
    }
    .btn-grad-border {
      position: relative;
      border: 1px solid transparent !important;
      background-clip: padding-box;
      color: hsl(var(--foreground)) !important;
      transition: transform 0.3s ease;
    }
    .btn-grad-border::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      padding: 1px;
      background: linear-gradient(120deg,
        hsl(var(--indigo)),
        hsl(var(--accent)),
        hsl(var(--lilac)),
        hsl(var(--indigo)));
      background-size: 300% 300%;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: grad-border 6s linear infinite;
      pointer-events: none;
    }
    .btn-grad-border:hover {
      color: hsl(var(--foreground)) !important;
      background-color: hsl(var(--secondary) / 0.6) !important;
    }
    @keyframes grad-border {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 50%; }
      100% { background-position: -100% 50%; }
    }
    .font-mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
    .bg-hero { background-image: var(--gradient-hero); }
    .bg-brand { background-image: var(--gradient-brand); }
    .scanline {
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        hsl(var(--foreground) / 0.02) 2px,
        hsl(var(--foreground) / 0.02) 3px
      );
    }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    const { useState, useEffect, useRef, forwardRef } = React;

        <rect width="20" height="8" x="2" y="2" rx="2" ry="2"></rect>

    const IconCpu = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>

    const IconBoxes = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>

    );

    const IconSparkles = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path>

    const IconMousePointer2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m4 4 7.07 17 2.51-7.39L21 11.07z"></path>

    );

    const IconInstagram = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line>
      </svg>
    );

    const IconMessageCircle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"></path>
      </svg>
    );

    // Button Component
    const Button = forwardRef(({ className, variant = "default", size = "default", asChild = false, ...props }, ref) => {
      const baseClasses = "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50";
      
      const variants = {
        default: "bg-primary text-primary-foreground hover:bg-primary/90",
        destructive: "bg-destructive text-destructive-foreground hover:bg-destructive/90",
        outline: "border border-input bg-background hover:bg-accent hover:text-accent-foreground",
        secondary: "bg-secondary text-secondary-foreground hover:bg-secondary/80",
        ghost: "hover:bg-accent hover:text-accent-foreground",
        link: "text-primary underline-offset-4 hover:underline",
      };
      
      const sizes = {
        default: "h-10 px-4 py-2",
        sm: "h-9 rounded-md px-3",
        lg: "h-11 rounded-md px-8",
        icon: "h-10 w-10",
      };
      
      const Comp = asChild ? "a" : "button";
      return <Comp className={`${baseClasses} ${variants[variant]} ${sizes[size]} ${className || ''}`} ref={ref} {...props} />;
    });
    Button.displayName = "Button";

    // Typewriter Component
    const Typewriter = () => {
      const lines = [
        "I build websites, servers & resilient systems.",
        "I ship fast UIs and calm infrastructure.",
        "I design software that stays out of the way.",
      ];
      const [i, setI] = useState(0);
      const [text, setText] = useState("");
      const [del, setDel] = useState(false);

      useEffect(() => {
        const current = lines[i % lines.length];
        const speed = del ? 30 : 55;
        const t = setTimeout(() => {
          if (!del) {
            const next = current.slice(0, text.length + 1);
            setText(next);
            if (next === current) setTimeout(() => setDel(true), 1400);
          } else {
            const next = current.slice(0, text.length - 1);
            setText(next);
            if (next === "") {
              setDel(false);
              setI((n) => n + 1);
            }
          }
        }, speed);
        return () => clearTimeout(t);
      }, [text, del, i]);

      return (
        <span className="font-mono text-sm md:text-base">
          <span className="text-accent">&gt;_</span> {text}
          <span className="ml-0.5 inline-block h-4 w-[2px] translate-y-0.5 bg-foreground animate-blink"></span>
        </span>
      );
    };

    // Discord Profile Component with Lanyard integration
    const DiscordProfile = () => {
      const [status, setStatus] = useState({
        avatar: "https://images-ext-1.discordapp.net/external/YqmWN0MyiIGpV3LKgDdMT1Csp1ko4hWQOHLm9Xs9uKA/%3Fsize%3D1024/https/cdn.discordapp.com/avatars/1332010581913239653/4ad68a384e1d531c6db12bad3a688a99.png?format=webp&quality=lossless",
        status: "online",
        activity: null
      });

      useEffect(() => {
        const userId = "YOUR_DISCORD_USER_ID"; // Replace with your actual Discord user ID
        const socket = new WebSocket("wss://api.lanyard.rest/socket");
        
        socket.onopen = () => {
          socket.send(JSON.stringify({ op: 2, d: { subscribe_to_id: userId } }));
        };

        socket.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.op === 1) {
            socket.send(JSON.stringify({ op: 3 }));
          } else if (data.op === 0) {
            const discordData = data.d;
            const avatar = discordData.discord_user.avatar
              ? `https://cdn.discordapp.com/avatars/${userId}/${discordData.discord_user.avatar}.png?size=512`
              : `https://cdn.discordapp.com/embed/avatars/${discordData.discord_user.discriminator % 5}.png`;
            
            setStatus({
              avatar,
              status: discordData.discord_status,
              activity: discordData.activities?.[0] || null
            });
          }
        };

        return () => socket.close();
      }, []);

      const statusColors = {
        online: "bg-emerald-400",
        idle: "bg-yellow-400",
        dnd: "bg-red-400",
        offline: "bg-gray-400"
      };

      return (
        <div className="relative animate-float">
          <div className="absolute inset-0 -z-10 blur-3xl">
            <div className="mx-auto h-full w-full rounded-full bg-brand opacity-40"></div>
          </div>
          <div className="relative flex h-36 w-36 items-center justify-center rounded-full p-[2px] md:h-40 md:w-40">
            <div className="absolute inset-0 rounded-full bg-brand opacity-80 blur-[2px]"></div>
            <div className="relative h-full w-full overflow-visible rounded-full bg-black">
              <img
                src={status.avatar}
                alt="Discord avatar"
                width={512}
                height={512}
                className="absolute inset-0 h-full w-full rounded-full object-cover"
              />
              <span
                className={`absolute bottom-1 right-1 block h-4 w-4 rounded-full ring-4 ring-black ${statusColors[status.status]}`}
                title={status.status}
              ></span>
            </div>
          </div>
          <div className="mt-3 text-center font-mono text-xs text-muted-foreground">
            @waltharist
          </div>
        </div>
      );
    };

    // Constellation Component
    const Constellation = () => {
      const canvasRef = useRef(null);
      const mouse = useRef({ x: -9999, y: -9999 });

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        let raf = 0;
        let width = 0;
        let height = 0;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let points = [];

        const resize = () => {
          width = canvas.clientWidth;
          height = canvas.clientHeight;
          canvas.width = width * dpr;
          canvas.height = height * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          const density = Math.floor((width * height) / 14000);
          points = Array.from({ length: Math.min(Math.max(density, 40), 140) }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.25,
            vy: (Math.random() - 0.5) * 0.25,
            r: Math.random() * 1.4 + 0.4,
            hue: 190 + Math.random() * 80,
          }));
        };

        const onMove = (e) => {
          const rect = canvas.getBoundingClientRect();
          mouse.current.x = e.clientX - rect.left;
          mouse.current.y = e.clientY - rect.top;
        };
        const onLeave = () => {
          mouse.current.x = -9999;
          mouse.current.y = -9999;
        };

        const tick = () => {
          ctx.clearRect(0, 0, width, height);

          for (const p of points) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < -10) p.x = width + 10;
            if (p.x > width + 10) p.x = -10;
            if (p.y < -10) p.y = height + 10;
            if (p.y > height + 10) p.y = -10;

            const dx = mouse.current.x - p.x;
            const dy = mouse.current.y - p.y;
            const d2 = dx * dx + dy * dy;
            if (d2 < 22500) {
              const f = (1 - d2 / 22500) * 0.02;
              p.vx += dx * f * 0.01;
              p.vy += dy * f * 0.01;
            }
            p.vx *= 0.995;
            p.vy *= 0.995;
          }

          for (let i = 0; i < points.length; i++) {
            for (let j = i + 1; j < points.length; j++) {
              const a = points[i];
              const b = points[j];
              const dx = a.x - b.x;
              const dy = a.y - b.y;
              const d = Math.sqrt(dx * dx + dy * dy);
              if (d < 130) {
                const alpha = (1 - d / 130) * 0.35;
                ctx.strokeStyle = `hsla(${(a.hue + b.hue) / 2}, 90%, 70%, ${alpha})`;
                ctx.lineWidth = 0.6;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
              }
            }
          }

          for (const p of points) {
            ctx.fillStyle = `hsla(${p.hue}, 95%, 75%, 0.9)`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          }

          raf = requestAnimationFrame(tick);
        };

        resize();
        tick();
        window.addEventListener("resize", resize);
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseleave", onLeave);
        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener("resize", resize);
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseleave", onLeave);
        };
      }, []);
